{phase:3,week:14,day:98,tag:'ai-defense',title:'Authentication & Authorization for AI Systems',objective:'Design auth that works at AI system scale — agents, users, and services.',desc:'AI systems have unique auth requirements: users, agents, tools, services all need different auth models.',tasks:['Design: Auth matrix for your AI system — who can call what?','Implement: API key system with TypeScript — generate, hash, verify, revoke keys','Understand: Service-to-service auth — mTLS or JWT for internal AI microservices','Implement: RBAC (Role-Based Access Control) — admin users can access more AI features'],resources:['Auth0: API authentication patterns','jose library (TypeScript JWT)','Better Auth (TypeScript auth library)']},

{phase:3,week:14,day:99,tag:'ai-defense',title:'Encryption of AI Data at Rest and in Transit',objective:'Encrypt everything — vectors, prompts, user data, model outputs.',desc:'A breached database should be worthless to the attacker. Encrypt sensitive AI data.',tasks:['Learn: Encryption at rest — database-level, field-level, application-level','Implement: Encrypt user prompt history before storing in TypeScript with AES-256-GCM','Understand: Vector database encryption — does Pinecone/Supabase encrypt by default?','Key management: Where do encryption keys live? Use a KMS (Key Management Service)'],resources:['AWS KMS docs','Node.js crypto: AES-256-GCM example','Supabase security: encryption at rest']},

{phase:3,week:14,day:100,tag:'ai-defense',title:'Day 100 Milestone — Threat Intelligence Integration',objective:'Integrate real-time threat intelligence into your AI security posture.',desc:'Day 100! You\'re halfway. Celebrate with a complex defensive system: real-time threat intelligence.',tasks:['Learn: Threat intelligence feeds — IP reputation, malicious prompt databases','Integrate: AbuseIPDB API — check if requester IP is in blocklist','TypeScript: Middleware that checks IP reputation on each request','Build: A block-list of known prompt injection patterns from public databases'],resources:['AbuseIPDB API (free tier)','VirusTotal API (IP/URL reputation)','Emerging Threats: blocklist.de']},

{phase:3,week:14,day:101,tag:'ai-defense',title:'AI Observability & Security Monitoring',objective:'See everything your AI system does — detect attacks in real time.',desc:'Security monitoring for AI systems must track not just HTTP logs but AI-specific events: token usage, prompt patterns, injection attempts.',tasks:['Learn: LLM observability tools — Langfuse, Helicone, Braintrust','Implement: Langfuse TypeScript SDK — trace every LLM call with metadata','Build: Custom anomaly detection — flag users whose prompts match injection patterns','Dashboard: What 5 metrics would tell you if your AI system is under attack right now?'],resources:['Langfuse.com (open source, self-hostable)','Helicone.ai (TypeScript SDK)']},

{phase:3,week:14,day:102,tag:'ai-defense',title:'Secure AI Model Deployment',objective:'Harden the infrastructure that runs your AI models.',objective:'Deploy AI models with production-grade security controls.',desc:'Serving a model means running a server. That server has an OS, network, and dependencies — all attack surfaces.',tasks:['Learn: Docker security — non-root user, read-only filesystem, no-new-privileges','Implement: Dockerfile for an AI API service with security hardening','Understand: Kubernetes security contexts — running AI pods securely','Network policy: AI model server should only accept traffic from API gateway'],resources:['Docker security best practices (official docs)','Kubernetes: Pod Security Standards','Trivy: container vulnerability scanner (aquasecurity/trivy)']},

{phase:3,week:14,day:103,tag:'ai-defense',title:'Secure Prompt Engineering Patterns',objective:'Design prompt architectures that are inherently more secure.',desc:'Security by design applies to prompts too. How you structure prompts determines how attackable they are.',tasks:['Pattern 1: Separate instruction and data via XML tags — <instructions> vs <user_input>','Pattern 2: Structured output enforcement — JSON schema in system prompt','Pattern 3: Two-model architecture — classifier model checks before reasoning model','TypeScript: Implement all 3 patterns in a TypeScript prompt factory class'],resources:['Anthropic: Prompt engineering docs (docs.anthropic.com)','Simon Willison: Secure prompt engineering patterns']},

{phase:3,week:14,day:104,tag:'ai-defense',title:'Week 14 Boss: Security Hardened AI Service',objective:'Build a complete, security-hardened AI microservice from scratch.',desc:'This is a portfolio project. A TypeScript AI service that you\'d be comfortable showing in a job interview.',tasks:['TypeScript + Express: Secure AI chat endpoint','Security features: Auth, rate limiting, input validation, prompt hardening, output filtering, logging, metrics','Deploy: To Cloudflare Workers or similar','Test: Run your attack toolkit against it. Document what passes and what fails.','Write: Architecture Decision Records (ADRs) for each security choice'],resources:['Cloudflare Workers TypeScript','Hono.js (lightweight TS web framework for Workers)']},

// Week 15
{phase:3,week:15,day:105,tag:'ai-defense',title:'Formal AI Safety Frameworks',objective:'Apply NIST AI RMF and ISO 42001 to real AI system design.',desc:'Enterprise AI requires formal safety frameworks. Knowing them separates architects from engineers.',tasks:['Study: NIST AI RMF — 4 functions: Govern, Map, Measure, Manage','Understand: ISO 42001 — AI Management System standard','Apply: Walk your Movie RAG app through the NIST AI RMF Map function — identify AI risks','Create: A one-page AI Risk Register for your system'],resources:['NIST AI RMF: airc.nist.gov (free)','ISO 42001 overview (iso.org)']},

{phase:3,week:15,day:106,tag:'ai-defense',title:'Differential Privacy for AI',objective:'Add mathematical privacy guarantees to your AI system.',desc:'Differential privacy lets you analyze aggregate data without exposing individuals. It\'s the gold standard for privacy-preserving AI.',tasks:['Learn: What is differential privacy? The epsilon (ε) privacy budget','Understand: How DP is applied to training data (DP-SGD)','Tools: Apple\'s DP library, TensorFlow Privacy','TypeScript angle: Add noise to aggregate query results from your RAG system'],resources:['Apple Differential Privacy paper (summary)','Damien Desfontaines: DP blog (ted.is/dp)']},

{phase:3,week:15,day:107,tag:'ai-defense',title:'Federated Learning Security',objective:'Train AI models on distributed data without centralizing sensitive information.',desc:'Federated learning keeps training data local. But it introduces new attack vectors: gradient poisoning.',tasks:['Learn: How federated learning works — local training, gradient aggregation','Understand: Security risks — gradient inversion, Byzantine attacks from malicious clients','Understand: When to recommend federated learning for an AI system (healthcare, finance)','Architecture: Design a simple FL system diagram with security annotations'],resources:['Google: Federated Learning overview','Flower framework (flwr.dev) for federated learning']},

{phase:3,week:15,day:108,tag:'ai-defense',title:'Red Team vs Blue Team for AI',objective:'Understand the organizational structure of AI security — who attacks, who defends.',desc:'In mature AI organizations, dedicated red teams attack AI systems while blue teams defend. You need to understand both roles.',tasks:['Learn: AI Red Team structure — how Anthropic, DeepMind, OpenAI organize red teaming','Understand: Blue Team AI — monitoring, detection, response for AI threats','Understand: Purple Team — red and blue working together','Design: How would you structure an AI security team for a 20-person AI startup?'],resources:['Microsoft AI Red Team: "Lessons Learned" blog post','Anthropic: Responsible Scaling Policy (anthropic.com)']},

{phase:3,week:15,day:109,tag:'ai-defense',title:'Watermarking AI Outputs',objective:'Detect whether text was AI-generated — and prove your model generated specific output.',desc:'AI watermarking lets you identify model outputs, detect misuse, and prove intellectual property ownership.',tasks:['Learn: Text watermarking — statistical patterns embedded in generated text','Understand: Cryptographic watermarking — signature in model outputs','Tools: Explore watermarking research from Kirchenbauer et al.','Build: A naive watermarking system — embed a checksum in every 10th word position in AI output'],resources:['Kirchenbauer et al. "A Watermark for LLMs" (paper summary)','Grinbaum: AI output detection survey']},

{phase:3,week:15,day:110,tag:'ai-defense',title:'Zero Trust for AI Microservices',objective:'Apply Zero Trust principles to every service-to-service communication in your AI system.',desc:'Your AI system will have many services: API gateway, LLM proxy, vector DB, auth service. None should trust the others by default.',tasks:['Design: Zero Trust architecture diagram for a complete AI application','Implement: mTLS between two TypeScript microservices (mutual authentication)','Understand: Service mesh concepts — Istio, Linkerd for AI microservices','Apply: Every AI service gets its own service account with minimal permissions'],resources:['Google BeyondCorp paper','Istio security docs','HashiCorp Vault for service auth']},

{phase:3,week:15,day:111,tag:'ai-defense',title:'Week 15 Boss: Defense Review & Hardening Sprint',objective:'Audit a real project for security gaps and fix them in 30 minutes.',desc:'Security audits are time-pressured. Practice finding and fixing multiple issues fast.',tasks:['Target: Any of your TypeScript projects from the Scrimba AI course','Audit checklist: Auth, input validation, secrets, rate limiting, CORS, headers, logging','Fix: Every HIGH severity finding you discover','Document: What you found, what you fixed, and what you deferred (and why)'],resources:['Your own code','Your security checklist from Month 1']},

// Week 16
{phase:3,week:16,day:112,tag:'ai-defense',title:'API Gateway Security Patterns',objective:'Design and implement an API gateway that acts as your AI system\'s security perimeter.',desc:'The API gateway is the chokepoint where you enforce all security policies. Design it well.',tasks:['Learn: API gateway pattern — what it does for security','Understand: Kong, AWS API Gateway, Cloudflare Workers as API gateways','Implement: TypeScript API gateway with: auth, rate limit, input validation, routing','Design: How does the gateway protect the LLM proxy behind it?'],resources:['Cloudflare Workers (your platform)','Hono.js (TypeScript web framework for Workers)']},

{phase:3,week:16,day:113,tag:'ai-defense',title:'Secrets Rotation & Key Management',objective:'Implement automated secret rotation — the security practice most developers skip.',desc:'Static secrets are ticking time bombs. API keys that never rotate are eventual breaches.',tasks:['Design: Secret rotation policy — how often, how to rotate without downtime','Implement: Two-API-key system — primary + secondary, rotate without service interruption','TypeScript: Build a SecretRotationManager class','Automate: GitHub Action that reminds you to rotate secrets every 90 days'],resources:['AWS Secrets Manager rotation docs','Doppler: automatic secret rotation','HashiCorp Vault dynamic secrets']},

{phase:3,week:16,day:114,tag:'ai-defense',title:'Audit Logging & Non-Repudiation',objective:'Build tamper-evident logs that prove what happened in your AI system.',desc:'When an incident happens, audit logs determine what occurred and who did it. Make them impossible to falsify.',tasks:['Learn: Non-repudiation — logs that prove who did what','Implement: Append-only audit log in TypeScript with HMAC chain (each entry includes hash of previous)','Include: Every LLM call, every auth event, every rate limit hit','Store: Send audit logs to immutable store (Cloudflare R2, AWS S3 with object lock)'],resources:['NIST: Audit logging requirements (SP 800-92)','AWS S3 Object Lock docs']},

{phase:3,week:16,day:115,tag:'ai-defense',title:'Responsible Disclosure & Bug Bounty Setup',objective:'Set up your own responsible disclosure program for AI systems.',desc:'If your AI product grows, security researchers will find vulnerabilities. Having a disclosure program shows maturity.',tasks:['Create: SECURITY.md for your main project (GitHub standard location)','Write: Responsible disclosure policy — what researchers should do when they find a bug','Setup: Dedicated security email address','Draft: A simple bug bounty scope definition — what is in scope, what is out'],resources:['GitHub: security policy docs','HackerOne: responsible disclosure policy templates','disclose.io (vulnerability disclosure standard)']},

{phase:3,week:16,day:116,tag:'ai-defense',title:'AI System Resilience & Recovery',objective:'Design your AI system to survive attacks and recover quickly.',desc:'Security isn\'t just prevention — it\'s resilience. When (not if) something fails, your system should degrade gracefully.',tasks:['Learn: Circuit breaker pattern for AI services — fail fast, recover gracefully','Implement: Fallback responses when AI service is unavailable or rate-limited','Design: Chaos engineering for AI — what happens when the LLM API is down?','TypeScript: Implement exponential backoff with jitter for LLM API calls'],resources:['Netflix Chaos Monkey concept','Resilience4j patterns (adapt to TypeScript)']},

{phase:3,week:16,day:117,tag:'ai-defense',title:'Compliance Automation',objective:'Automate compliance checks so security doesn\'t slow down development.',desc:'Manual compliance checks don\'t scale. Automate them and make security a natural part of your CI/CD.',tasks:['Setup: Pre-commit hooks with Husky — run security checks before every commit','Add: Secrets scanning with git-secrets or gitleaks pre-commit hook','Add: npm audit in CI/CD pipeline — fail build on HIGH severity','TypeScript: Compliance check script that tests security headers, auth, and rate limiting'],resources:['Husky docs (typicode.github.io/husky)','Gitleaks: github.com/gitleaks/gitleaks','GitHub Advanced Security (if using GitHub)']},

{phase:3,week:16,day:118,tag:'ai-defense',title:'Month 4 Boss Prep — Architecture Review',objective:'Prepare a comprehensive security architecture review for a complete AI system.',desc:'Architecture reviews are how senior engineers validate security. Practice the format.',tasks:['Target: Your most complete AI project','Review: Threat model accuracy — has anything changed since Month 1?','Review: Defense coverage — for each threat, is there a control?','Gaps: What threats have no controls? Prioritize and plan.','Document: Architecture review document with all findings'],resources:['Google: Design Document security review template','AWS: Architecture well-architected review (security pillar)']},

{phase:3,week:16,day:119,tag:'ai-defense',title:'Security Metrics & KPIs for AI Systems',objective:'Define and track metrics that tell you if your AI security posture is improving.',desc:'What gets measured gets managed. Define your AI security KPIs.',tasks:['Define: MTTD (Mean Time to Detect) — how fast do you detect attacks?','Define: MTTR (Mean Time to Respond) — how fast do you respond?','AI metrics: Token abuse rate, injection attempt rate, blocked request rate','TypeScript: Build a SecurityMetrics class that tracks and reports these in real time'],resources:['SANS: Security Metrics (white paper)','Datadog: Security monitoring dashboards']},

{phase:3,week:16,day:120,tag:'ai-defense',title:'Month 4 Boss: Complete Defense Architecture',objective:'Ship a fully documented, tested, production-ready secure AI system.',desc:'This is a major milestone. Month 4 final boss: a complete, defensively designed AI system.',tasks:['Ship: Your hardened AI API service from Week 14 boss — with all Month 4 improvements','Add: Audit logging, metrics, threat intelligence integration','Document: Complete security documentation — threat model, controls, KPIs, incident response','Test: Full attack suite from Month 3 against your hardened Month 4 system','Compare: How many attacks now fail that previously succeeded?'],resources:['Your own code','Your attack toolkit from Month 3']},

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// PHASE 4 — MONTH 5: DEVSECOPS FOR AI (Days 121–150)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
{phase:4,week:17,day:121,tag:'devsecops',title:'DevSecOps Fundamentals',objective:'Shift security left — integrate it into every step of development.',desc:'DevSecOps means security is not a final check — it\'s woven into every commit, build, and deploy.',tasks:['Learn: Shift-left security — find vulnerabilities earlier = cheaper fixes','Understand: DevSecOps pipeline stages: Code → Build → Test → Deploy → Monitor','Map: Your current AI project workflow. Where does security currently happen?','Design: Add security gates at: pre-commit, PR, CI, pre-deploy, and runtime'],resources:['CISA: DevSecOps fundamentals (free)','NIST: Software Supply Chain security guide']},

{phase:4,week:17,day:122,tag:'devsecops',title:'Static Application Security Testing (SAST)',objective:'Find vulnerabilities in source code automatically on every commit.',desc:'SAST tools read your TypeScript and flag potential vulnerabilities before they reach production.',tasks:['Setup: ESLint security plugin (eslint-plugin-security) on your TypeScript projects','Setup: Semgrep with TypeScript security ruleset (semgrep --config=r/typescript)','Run: Semgrep on your existing code. What does it find?','Fix: Address all HIGH severity findings from SAST scan'],resources:['Semgrep.dev (free for open source)','eslint-plugin-security (npm)','GitHub: CodeQL for TypeScript (free for public repos)']},

{phase:4,week:17,day:123,tag:'devsecops',title:'Dynamic Application Security Testing (DAST)',objective:'Find vulnerabilities by attacking your running application automatically.',desc:'DAST scans your running app like an attacker would. It finds what SAST misses.',tasks:['Setup: OWASP ZAP (Zed Attack Proxy) — free DAST tool','Run: ZAP baseline scan against your local AI API','Understand: Active vs passive scanning — difference and when to use each','CI integration: Add ZAP scan to GitHub Actions — fail PR if new HIGH findings'],resources:['OWASP ZAP (zaproxy.org, free)','GitHub Actions: ZAP scan action','Nikto: lightweight alternative']},

{phase:4,week:17,day:124,tag:'devsecops',title:'Container Security',objective:'Harden every Docker container your AI services run in.',desc:'Containers are the deployment unit for AI. An insecure container = an insecure AI service.',tasks:['Learn: Docker threat model — container escape, privilege escalation, image vulnerabilities','Scan: Trivy your existing Docker images: trivy image myapp:latest','Harden: Non-root user, read-only root filesystem, drop capabilities in Dockerfile','TypeScript: Minimal Dockerfile for Node.js AI service with all hardening applied'],resources:['Trivy (aquasecurity/trivy, free)','Docker: Security best practices (official docs)','Distroless images (github.com/GoogleContainerTools/distroless)']},

{phase:4,week:17,day:125,tag:'devsecops',title:'Infrastructure as Code Security',objective:'Find misconfigurations in Terraform, Pulumi, and CloudFormation before they deploy.',desc:'IaC misconfigurations create insecure cloud infrastructure. Scan them before deployment.',tasks:['Learn: Common IaC security mistakes — open S3 buckets, overly permissive IAM roles','Tool: Checkov — IaC security scanner (checkov.io)','Tool: tfsec — Terraform security scanner','Write: A Terraform config for an AI API server. Run Checkov against it.'],resources:['Checkov (checkov.io, free)','tfsec (aquasecurity/tfsec)','Pulumi: security best practices']},

{phase:4,week:17,day:126,tag:'devsecops',title:'Secure CI/CD Pipeline Design',objective:'Build a CI/CD pipeline that enforces security at every stage.',desc:'Your CI/CD pipeline should be the gatekeeper. Nothing reaches production without passing security checks.',tasks:['Design: GitHub Actions pipeline for AI TypeScript project','Add: Stage 1 — npm audit + SAST (Semgrep)','Add: Stage 2 — unit tests + DAST (ZAP baseline)','Add: Stage 3 — container scan (Trivy) + IaC scan (Checkov)','Add: Stage 4 — deploy only if all stages pass'],resources:['GitHub Actions docs','CISA: Securing CI/CD pipelines (free guide)']},

{phase:4,week:17,day:127,tag:'devsecops',title:'Week 17 Boss: Fully Secured CI/CD',objective:'Ship a GitHub Actions pipeline with all security gates working.',desc:'This is a real deliverable. A CI/CD pipeline with security baked in is a portfolio centerpiece.',tasks:['Implement: Full GitHub Actions workflow for your main AI TypeScript project','Security gates: SAST → DAST → Container scan → Deploy','PR check: All security gates must pass before PR can merge','Document: README section explaining your security pipeline','Test: Introduce a known vulnerability. Watch the pipeline catch it.'],resources:['GitHub Actions marketplace (security actions)','act (run GitHub Actions locally: github.com/nektos/act)']},

// Week 18
{phase:4,week:18,day:128,tag:'devsecops',title:'Cloud IAM Deep Dive',objective:'Master Identity and Access Management — the foundation of cloud security.',desc:'IAM misconfigurations are the #1 cause of cloud breaches. As an AI Architect, you design the IAM.',tasks:['Learn: AWS IAM — users, groups, roles, policies, permission boundaries','Understand: Principle of least privilege in IAM — start with deny all, add only needed permissions','Write: IAM policy JSON for your AI API service — what minimum permissions does it need?','Understand: IAM roles for EC2/Lambda vs IAM users — when to use each'],resources:['AWS IAM policy simulator (console.aws.amazon.com)','Cloud Security Alliance: IAM best practices','IAM Vulnerable: practice IAM privilege escalation']},

{phase:4,week:18,day:129,tag:'devsecops',title:'Secrets Management in Production',objective:'Implement a production-grade secrets management system for AI applications.',desc:'Environment variables aren\'t enough. Production AI systems need proper secret management with rotation, audit trails, and access control.',tasks:['Setup: HashiCorp Vault (Docker for local), or use Doppler/Infisical','Implement: TypeScript client that fetches secrets from Vault at startup','Add: Secret versioning — keep old secret version during rotation grace period','Audit: Every secret access logged with who, what, when'],resources:['HashiCorp Vault getting started','Infisical (open source, TypeScript SDK)','Doppler (hosted secret manager)']},

{phase:4,week:18,day:130,tag:'devsecops',title:'Network Security for AI Systems',objective:'Design network architecture that isolates and protects AI components.',desc:'Network segmentation limits blast radius. A breached frontend shouldn\'t reach your model weights.',tasks:['Learn: VPCs, subnets, security groups — cloud network primitives','Design: Network architecture — public subnet (API), private subnet (LLM proxy, vector DB)','Understand: VPC peering vs PrivateLink for connecting AI services','TypeScript: No code today — draw and document a complete network architecture diagram'],resources:['AWS VPC concepts (free docs)','Cloudflare Zero Trust Network Access']},

{phase:4,week:18,day:131,tag:'devsecops',title:'Kubernetes Security for AI Workloads',objective:'Run AI workloads securely in Kubernetes.',desc:'Large-scale AI deployments use Kubernetes. Security misconfigurations in K8s are serious.',tasks:['Learn: Kubernetes attack surface — API server, etcd, kubelet, node','Understand: Pod Security Admission (PSA) — enforce security contexts','Learn: RBAC in Kubernetes — who can do what in the cluster','Write: A secure Kubernetes deployment YAML for an AI inference service'],resources:['Kubernetes: Security Best Practices (official docs)','kube-bench: CIS benchmark scanner','Falco: runtime security for Kubernetes']},

{phase:4,week:18,day:132,tag:'devsecops',title:'Service Mesh & Zero Trust Networking',objective:'Implement zero trust networking between AI microservices.',desc:'Service meshes add encryption, authentication, and authorization to service-to-service communication.',tasks:['Learn: What is a service mesh? Istio, Linkerd, Consul Connect','Understand: mTLS (mutual TLS) — how services authenticate to each other','Learn: Traffic policies — allow only authorized service-to-service calls','Design: Service mesh architecture for your AI system\'s microservices'],resources:['Istio: Getting started','Linkerd.io (simpler than Istio)','Cloudflare Service tokens (for Workers-based services)']},

{phase:4,week:18,day:133,tag:'devsecops',title:'Security Chaos Engineering',objective:'Deliberately break your AI system\'s security to find weaknesses before attackers do.',desc:'If you never test whether your security controls work, you don\'t know if they work.',tasks:['Learn: Security chaos engineering — deliberately trigger attack scenarios in staging','Design: 5 security chaos experiments for your AI system','Run: Deliberately revoke an API key and verify the system rejects requests','Run: Flood the rate limiter and verify it engages','Run: Inject a prompt injection and verify the guardrail catches it'],resources:['Chaos Monkey principle (Netflix blog)','Gremlin: chaos engineering (free tier)']},

{phase:4,week:18,day:134,tag:'devsecops',title:'Week 18 Boss: Infrastructure Hardening Sprint',objective:'Harden your complete AI system infrastructure in one session.',desc:'Systematic hardening sprint. Go through each infrastructure component with a checklist.',tasks:['Container: Trivy scan → fix all CRITICAL and HIGH','CI/CD: Verify all security gates are active and working','IAM: Audit all permissions — remove any that are too broad','Secrets: Ensure no secrets in code or logs (use gitleaks scan)','Network: Verify API is not publicly exposing debug endpoints'],resources:['CIS Benchmarks (cisecurity.org, many free)','Your security checklists from previous months']},

// Week 19
{phase:4,week:19,day:135,tag:'devsecops',title:'SCA — Software Composition Analysis',objective:'Track every third-party dependency and its vulnerabilities continuously.',desc:'SCA gives you a real-time view of vulnerable dependencies. For AI systems with many ML libraries, this is critical.',tasks:['Setup: Snyk TypeScript integration (snyk.io, free tier)','Run: snyk test on all your projects','Understand: Snyk monitor — continuous monitoring that alerts on new CVEs','Create: Dependency update policy — how quickly do you patch CRITICAL vs HIGH?'],resources:['Snyk.io (free for open source)','Socket.dev (supply chain focused SCA)','Dependabot (GitHub native, free)']},

{phase:4,week:19,day:136,tag:'devsecops',title:'Security Testing Automation',objective:'Build automated security test suites that run in CI.',desc:'Manual security testing doesn\'t scale. Automate the repeatable parts.',tasks:['TypeScript: Write automated security tests using supertest + jest','Test: Verify rate limiting engages (send 100 requests, expect 429)','Test: Verify auth is required (send unauthenticated request, expect 401)','Test: Verify CORS is configured (send request from wrong origin, expect rejection)'],resources:['supertest (HTTP testing library for Node.js)','jest (TypeScript test runner)']},

{phase:4,week:19,day:137,tag:'devsecops',title:'GitOps Security',objective:'Secure your GitOps workflow — branch protection, signed commits, secret scanning.',desc:'Your Git repo is the source of truth for your infrastructure. Compromising it compromises everything.',tasks:['Enable: GitHub branch protection on main — require PR + security check pass','Enable: GitHub secret scanning — alert on any committed secrets','Enable: Commit signing with GPG or SSH keys','Enable: Required reviewers for any changes to security-sensitive files (.env.example, Dockerfile, CI)'],resources:['GitHub: Branch protection rules','GitHub: Secret scanning docs','GitHub: Commit signing with SSH keys']},

{phase:4,week:19,day:138,tag:'devsecops',title:'Penetration Testing Your CI/CD',objective:'Attack your own CI/CD pipeline to find weaknesses.',desc:'CI/CD pipelines are high-value targets. A compromised pipeline means a compromised production system.',tasks:['Learn: CI/CD pipeline attacks — secret theft from env vars, dependency confusion','Understand: GitHub Actions security — use pinned actions (@sha not @v1)','Attack: Can you read secrets from a GitHub Actions log? (deliberately leak one in a branch)','Fix: Pin all GitHub Actions to commit SHA. Add secret masking.'],resources:['Palo Alto: CI/CD security guide','GitHub: Security hardening GitHub Actions']},

{phase:4,week:19,day:139,tag:'devsecops',title:'Monitoring & Alerting for Security Events',objective:'Build a security monitoring system that alerts on attack patterns in real time.',desc:'Detection is only useful if it leads to rapid response. Build end-to-end alerting.',tasks:['Setup: Structured logging with Pino (TypeScript, fast JSON logs)','Ship logs: to Cloudflare Logpush or similar','Alerts: Set up alerts for: 401 spike, 429 spike, unusual token usage, error rate surge','TypeScript: AlertRule[] — define your alert conditions as typed objects'],resources:['Pino (getpino.io, TypeScript logging)','Cloudflare Logpush','PagerDuty or Slack webhooks for alerts']},

{phase:4,week:19,day:140,tag:'devsecops',title:'Security Documentation & Runbooks',objective:'Write the security documentation that will save you at 3am when something breaks.',desc:'When an incident happens, you won\'t have time to think clearly. Runbooks are your pre-thought-out response plan.',tasks:['Write: Incident response runbook for "API key leaked" scenario','Write: Runbook for "prompt injection attack detected" scenario','Write: Runbook for "unusual spike in AI API costs"','Format: Each runbook: Trigger → Immediate actions → Investigation → Resolution → Post-mortem'],resources:['PagerDuty: Incident response templates (free)','Google SRE Book: Chapter on on-call runbooks (free online)']},

// Week 20
{phase:4,week:20,day:141,tag:'devsecops',title:'AI Model Registry Security',objective:'Secure the storage and distribution of AI model artifacts.',desc:'As you build fine-tuned models, you need a secure model registry. Models are large, valuable, and tamper-sensitive.',tasks:['Learn: Model registry concept — versioning, lineage, access control','Understand: DVC (Data Version Control) for model and dataset versioning','Understand: HuggingFace private models — access tokens, gated repos','TypeScript: Build a model artifact integrity checker — SHA-256 verify before loading'],resources:['DVC.org (open source, free)','HuggingFace: Private models and access tokens','MLflow (model registry, free self-hosted)']},

{phase:4,week:20,day:142,tag:'devsecops',title:'Data Pipeline Security',objective:'Secure the entire data pipeline from ingestion to the vector database.',desc:'Your RAG system has a complex data pipeline. Each stage is an attack surface.',tasks:['Map: Your RAG data pipeline — source → scrape/load → embed → store → retrieve','Identify: Attack surfaces at each stage','Defense: Sign data at ingestion, verify signature at retrieval','TypeScript: DataChain — add integrity metadata to every document before embedding'],resources:['Apache Kafka security (if using streaming)','OWASP: Data validation cheat sheet']},

{phase:4,week:20,day:143,tag:'devsecops',title:'Multi-Cloud Security Considerations',objective:'Understand security implications of multi-cloud AI architectures.',desc:'Your AI system might use Anthropic API + Cloudflare + Supabase + Pinecone. Each cloud has different security models.',tasks:['Map: Every cloud service your AI system uses','Understand: Vendor lock-in vs security diversification','Risk: What happens if one provider is breached? How does it affect the others?','Design: Data classification — what data can live in which cloud?'],resources:['CNCF: Cloud Native Security Whitepaper','AWS + Cloudflare integration patterns']},

// ═══════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'shield_progress_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function isDayComplete(day) { return !!state[`d${day}`]; }
function isPhaseComplete(phaseIdx) {
  return MISSIONS.filter(m=>m.phase===phaseIdx).every(m=>isDayComplete(m.day));
}

function getNextUnlocked() {
  for(let i=0;i<MISSIONS.length;i++){
    if(!isDayComplete(MISSIONS[i].day)) return MISSIONS[i].day;
  }
  return 181;
}

function isDayLocked(day) {
  return day > getNextUnlocked();
}

function getStreak() {
  let streak=0;
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(!state.lastDate) return 0;
  if(state.lastDate!==today&&state.lastDate!==yesterday) return 0;
  return state.streak||0;
}

function getCompletedCount() {
  return MISSIONS.filter(m=>isDayComplete(m.day)).length;
}

function getXP() { return getCompletedCount()*10; }

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
const TAG_CONFIG = {
  'foundation':  {cls:'tag-foundation', label:'FOUNDATION'},
  'web':         {cls:'tag-web', label:'WEB SEC'},
  'ai-attack':   {cls:'tag-ai-attack', label:'AI ATTACK'},
  'ai-defense':  {cls:'tag-ai-defense', label:'AI DEFENSE'},
  'devsecops':   {cls:'tag-devsecops', label:'DEVSECOPS'},
  'red-team':    {cls:'tag-red-team', label:'RED TEAM'},
};

const PHASE_NAMES = [
  'Month 1 — Security Foundations',
  'Month 2 — Web Security & OWASP',
  'Month 3 — AI Attack Techniques',
  'Month 4 — AI Defense & Guardrails',
  'Month 5 — DevSecOps for AI',
  'Month 6 — Red Team & Capstone',
];

function renderPhases() {
  const container = document.getElementById('phasePanels');
  const phaseIndices = [0,1,2,3,4,5];

  container.innerHTML = phaseIndices.map(pi => {
    const missions = MISSIONS.filter(m=>m.phase===pi);
    const weeks = [...new Set(missions.map(m=>m.week))];
    const isActive = pi === parseInt(document.querySelector('.phase-btn.active')?.dataset.phase||'0');

    return `<div class="phase-content ${isActive?'active':''}" id="phase${pi}">
      <div class="month-section">
        <div class="month-header">
          <span class="month-num">MONTH ${pi+1}</span>
          <span class="month-title">${PHASE_NAMES[pi]}</span>
          <span class="month-theme">${missions.filter(m=>isDayComplete(m.day)).length}/${missions.length} COMPLETE</span>
        </div>
        <div class="month-progress-bar">
          <div class="month-progress-fill" style="width:${(missions.filter(m=>isDayComplete(m.day)).length/missions.length*100)}%"></div>
        </div>
        ${weeks.map(w => {
          const wm = missions.filter(m=>m.week===w);
          return `<div class="week-label">── WEEK ${w} ──────────────────────────────────────</div>
          ${wm.map(m => renderDayCard(m)).join('')}`;
        }).join('')}
      </div>
    </div>`;
  }).join('');

  // Attach events
  container.querySelectorAll('.day-header').forEach(el => {
    el.addEventListener('click', () => {
      const card = el.closest('.day-card');
      if(card.classList.contains('locked')) return;
      card.classList.toggle('open');
    });
  });

  container.querySelectorAll('.complete-btn').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const day = parseInt(el.dataset.day);
      completeDay(day);
    });
  });
}

function renderDayCard(m) {
  const complete = isDayComplete(m.day);
  const next = getNextUnlocked();
  const locked = m.day > next;
  const active = m.day === next;
  const tc = TAG_CONFIG[m.tag]||TAG_CONFIG.foundation;

  const classes = ['day-card', locked?'locked':'', complete?'completed':'', active&&!complete?'active':''].filter(Boolean).join(' ');

  return `<div class="${classes}" id="day${m.day}">
    <div class="day-header">
      <span class="day-num">DAY ${String(m.day).padStart(3,'0')}</span>
      <span class="day-title">${m.title}</span>
      <span class="day-tag ${tc.cls}">${tc.label}</span>
      ${!locked ? `<span class="day-chevron">▼</span>` : ''}
    </div>
    ${!locked ? `<div class="day-body">
      <div class="day-objective">⟩ OBJECTIVE: ${m.objective}</div>
      <div class="day-desc">${m.desc}</div>
      <ul class="task-list">
        ${m.tasks.map(t=>`<li>${t}</li>`).join('')}
      </ul>
      <div class="resource-row">
        ${m.resources.map(r=>`<div class="resource-chip">${r}</div>`).join('')}
      </div>
      <button class="complete-btn" data-day="${m.day}" ${complete?'':''}>
        ${complete ? '✦ MISSION COMPLETE — MARK INCOMPLETE' : '▸ MARK MISSION COMPLETE'}
      </button>
    </div>` : ''}
  </div>`;
}

function updateStats() {
  const done = getCompletedCount();
  const xp = getXP();
  const streak = getStreak();
  const pct = Math.round(done/180*100);

  document.getElementById('statDays').textContent = done;
  document.getElementById('statXP').textContent = xp;
  document.getElementById('statStreak').textContent = streak;
  document.getElementById('statPct').textContent = pct+'%';
  document.getElementById('globalFill').style.width = pct+'%';
  document.getElementById('globalLabel').textContent = `${done} / 180 MISSIONS COMPLETE`;

  const streakBanner = document.getElementById('streakBanner');
  if(streak>1) {
    streakBanner.style.display='block';
    document.getElementById('streakCount').textContent = streak+' DAYS';
  } else {
    streakBanner.style.display='none';
  }

  // Update phase buttons
  document.querySelectorAll('.phase-btn').forEach(btn => {
    const pi = parseInt(btn.dataset.phase);
    if(isPhaseComplete(pi)) btn.classList.add('done-phase');
    else btn.classList.remove('done-phase');
  });
}

// ═══════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════
function completeDay(day) {
  if(isDayComplete(day)) {
    // Toggle off
    delete state[`d${day}`];
    saveState(state);
    renderPhases();
    updateStats();
    return;
  }

  state[`d${day}`] = Date.now();

  // Streak logic
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if(state.lastDate===today) {
    // same day, don't change streak
  } else if(state.lastDate===yesterday) {
    state.streak = (state.streak||0)+1;
  } else {
    state.streak = 1;
  }
  state.lastDate = today;

  saveState(state);

  // XP burst
  showXPBurst();

  // Modal
  const mission = MISSIONS.find(m=>m.day===day);
  showModal(day, mission);

  renderPhases();
  updateStats();

  // Auto-scroll to next day
  setTimeout(() => {
    const next = getNextUnlocked();
    const nextEl = document.getElementById(`day${next}`);
    if(nextEl) nextEl.scrollIntoView({behavior:'smooth', block:'center'});
  }, 1800);
}

function showXPBurst() {
  const el = document.getElementById('xpBurst');
  el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; }, 1500);
}

function showModal(day, mission) {
  const isMilestone = day%30===0;
  const title = document.getElementById('modalTitle');
  const msg = document.getElementById('modalMsg');

  if(day===180) {
    title.textContent = '🏆 SHIELD PROTOCOL COMPLETE';
    msg.textContent = 'You have completed the 180-day AI Security training. You are now an AI Security Architect. This is not a certificate — it is a capability. The rarest combination in tech.';
  } else if(isMilestone) {
    title.textContent = `✦ MONTH ${Math.floor(day/30)} COMPLETE`;
    msg.textContent = `Major milestone achieved. ${180-day} days remaining. Your security knowledge is compounding. Keep going.`;
  } else {
    title.textContent = `DAY ${day} CLEARED ✦`;
    msg.textContent = `+10 XP earned. ${180-day} missions remain. Each day makes you harder to breach and more valuable to hire.`;
  }

  document.getElementById('dayCompleteModal').classList.add('open');
}

function closeModal() {
  document.getElementById('dayCompleteModal').classList.remove('open');
}

function showPhase(idx) {
  document.querySelectorAll('.phase-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.phase-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById(`phase${idx}`).classList.add('active');
  document.querySelectorAll('.phase-btn')[idx].classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function confirmReset() {
  if(confirm('RESET ALL PROGRESS? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    state = {};
    renderPhases();
    updateStats();
  }
}

// Auto-navigate to active phase
function autoNavigateToActivePhase() {
  const next = getNextUnlocked();
  const nextMission = MISSIONS.find(m=>m.day===next);
  if(nextMission) {
    showPhase(nextMission.phase);
  }
}

// Init
renderPhases();
updateStats();
if(getCompletedCount()>0) autoNavigateToActivePhase();
</script>
</body>
